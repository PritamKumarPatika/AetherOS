<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AetherOS Login">
  <title>Login — AetherOS</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">

  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-gradient);
    }
    .auth-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-logo {
      font-size: 48px;
      margin-bottom: 8px;
      color: var(--primary-500);
    }
    .auth-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 14px;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .auth-form label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-light);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }
    .auth-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }
    .auth-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }
    .auth-button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    .auth-switch {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-switch a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .auth-switch a:hover {
      text-decoration: underline;
    }
    .auth-error {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-logo"><i class="ph-fill ph-planet"></i></div>
    <h1 class="auth-title">Welcome to AetherOS</h1>
    <p class="auth-subtitle">Sign in to your intelligent workspace</p>

    <div id="error-msg" class="auth-error">Invalid credentials</div>

    <form id="login-form" class="auth-form">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="auth-button">Sign In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </div>

  <script src="utils/api.js"></script>
  <script src="pages/login.js"></script>
</body>
</html>
